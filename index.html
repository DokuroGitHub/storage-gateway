<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ASR WebSocket Test</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    button { padding: 10px 20px; margin-right: 10px; }
    textarea { width: 100%; margin-top: 10px; }
    input, select { width: 100%; padding: 8px; margin-bottom: 10px; }
    #startMsg { height: 150px; font-family: monospace; }
    #transcript { height: 150px; }
  </style>
</head>
<body>

<h2>ASR WebSocket Test</h2>

<label>Saved URLs:</label>
<select id="urlSelect">
  <option value="wss://ci-bo-kong-ws.frt.vn/bo-lc-proctor-gateway/ws/asr">
    wss://ci-bo-kong-ws.frt.vn/bo-lc-proctor-gateway/ws/asr
  </option>
  <option value="ws://ci-proctor-gateway.ai.frt.local/ws/asr">
    ws://ci-proctor-gateway.ai.frt.local/ws/asr
  </option>
  <option value="wss://ci-bo-kong-ws.frt.vn/bo-lc-ai-asr/ws/asr">
    wss://ci-bo-kong-ws.frt.vn/bo-lc-ai-asr/ws/asr
  </option>
  <option value="custom">Custom...</option>
</select>

<label>WebSocket URL:</label>
<input 
  type="text" 
  id="wsUrl" 
  value="wss://ci-bo-kong-ws.frt.vn/bo-lc-proctor-gateway/ws/asr"
/>

<label>Start Message (JSON):</label>
<textarea id="startMsg">
{
  "event": "start",
  "language": "vi-VN",
  "phrases": ["Năm Tính Năng nổi bật", "Mẹ và bé", "Mẹ có Biết?"],
  "format": { "sample_rate": 16000 }
}
</textarea>

<button id="startBtn">Start</button>
<button id="stopBtn" disabled>End</button>

<p><b>Duration:</b> <span id="duration">0</span> sec</p>

<textarea id="transcript" placeholder="Transcription..."></textarea>

<script>
let ws;
let audioContext;
let processor;
let input;
let globalStream;
let startTime;
let durationTimer;
let totalText = "";

const transcriptBox = document.getElementById("transcript");
const durationEl = document.getElementById("duration");
const wsInput = document.getElementById("wsUrl");
const urlSelect = document.getElementById("urlSelect");
const startMsgBox = document.getElementById("startMsg");

// ✅ Load saved
window.onload = () => {
  const savedUrl = localStorage.getItem("wsUrl");
  const savedMsg = localStorage.getItem("startMsg");

  if (savedUrl) {
    wsInput.value = savedUrl;

    const options = Array.from(urlSelect.options);
    const match = options.find(o => o.value === savedUrl);
    urlSelect.value = match ? savedUrl : "custom";
  }

  if (savedMsg) {
    startMsgBox.value = savedMsg;
  }
};

// ✅ Dropdown → Input
urlSelect.onchange = () => {
  if (urlSelect.value !== "custom") {
    wsInput.value = urlSelect.value;
  }
};

// ✅ Input → Dropdown
wsInput.oninput = () => {
  const options = Array.from(urlSelect.options);
  const match = options.find(o => o.value === wsInput.value);
  urlSelect.value = match ? wsInput.value : "custom";
};

document.getElementById("startBtn").onclick = async () => {
  const url = wsInput.value.trim();
  const rawMsg = startMsgBox.value.trim();

  if (!url) {
    alert("Please enter WebSocket URL");
    return;
  }

  let startMsg;
  try {
    startMsg = JSON.parse(rawMsg);
  } catch (e) {
    alert("❌ Invalid JSON in Start Message");
    return;
  }

  // ✅ RESET STATE HERE
  totalText = "";
  transcriptBox.value = "";
  durationEl.innerText = "0";

  // (optional) reset chunk counter if you added logging
  if (typeof chunkCount !== "undefined") {
    chunkCount = 0;
  }

  localStorage.setItem("wsUrl", url);
  localStorage.setItem("startMsg", rawMsg);

  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";

  ws.onopen = async () => {
    console.log("✅ WS connected");

    ws.send(JSON.stringify(startMsg));

    startTime = Date.now();

    durationTimer = setInterval(() => {
      const duration = ((Date.now() - startTime) / 1000).toFixed(2);
      durationEl.innerText = duration;
    }, 100);

    startRecording();
  };

  ws.onmessage = (msg) => {
    try {
      const data = JSON.parse(msg.data);
      console.log(data);

      if (data.final) {
        totalText += data.final + " ";
        transcriptBox.value = totalText;
        return;
      }

      if (data.partial) {
        transcriptBox.value = totalText + data.partial;
        return;
      }

    } catch (e) {
      console.log("⚠️ Non-JSON message");
    }
  };

  ws.onerror = (err) => {
    console.error("❌ WS error:", err);
  };

  ws.onclose = () => {
    console.log("🔌 WS closed");
  };

  document.getElementById("startBtn").disabled = true;
  document.getElementById("stopBtn").disabled = false;
};

document.getElementById("stopBtn").onclick = () => {
  if (ws) {
    ws.send(JSON.stringify({ event: "end" }));
    ws.close();
  }

  stopRecording();
  clearInterval(durationTimer);

  const duration = ((Date.now() - startTime) / 1000).toFixed(2);
  durationEl.innerText = duration;

  console.log("⏱ FINAL duration:", duration);
  console.log("📝 FINAL transcript:", totalText);

  document.getElementById("startBtn").disabled = false;
  document.getElementById("stopBtn").disabled = true;
};

async function startRecording() {
  globalStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new (window.AudioContext || window.webkitAudioContext)({
    sampleRate: 16000
  });

  input = audioContext.createMediaStreamSource(globalStream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);

  processor.onaudioprocess = (e) => {
    const floatData = e.inputBuffer.getChannelData(0);
    const pcm16 = floatTo16BitPCM(floatData);

    const chunkSize = 640;

    for (let i = 0; i < pcm16.byteLength; i += chunkSize) {
      const chunk = pcm16.slice(i, i + chunkSize);

      if (ws && ws.readyState === 1) {
        ws.send(chunk);
      }
    }
  };

  input.connect(processor);
  processor.connect(audioContext.destination);
}

function stopRecording() {
  if (processor) processor.disconnect();
  if (input) input.disconnect();
  if (audioContext) audioContext.close();

  if (globalStream) {
    globalStream.getTracks().forEach(track => track.stop());
  }
}

function floatTo16BitPCM(float32Array) {
  const buffer = new ArrayBuffer(float32Array.length * 2);
  const view = new DataView(buffer);

  let offset = 0;
  for (let i = 0; i < float32Array.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, float32Array[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  return buffer;
}
</script>

</body>
</html>
